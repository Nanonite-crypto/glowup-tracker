<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="theme-color" content="#0b0b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GlowUp">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.svg">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>Glow Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0b0b0f;--s1:#131318;--s2:#1a1a22;--s3:#22222e;--border:#ffffff0a;--border-h:#ffffff12;--accent:#6ee7a0;--accent-dim:#6ee7a020;--accent-dark:#0f1a14;--blue:#7ab8f5;--blue-dim:#7ab8f520;--orange:#f0a060;--red:#e85d6f;--purple:#b48efa;--purple-dim:#b48efa20;--gold:#e8c860;--gold-dim:#e8c86020;--t1:#f0f0f4;--t2:#a0a0b0;--t3:#606070;--t4:#3a3a48;--r:10px}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
input{outline:none}
input:focus{border-color:var(--accent)!important;box-shadow:0 0 0 2px var(--accent-dim)!important}
button{cursor:pointer;-webkit-user-select:none;user-select:none;font-family:inherit;border:none;background:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

.shell{display:flex;height:100vh;height:100dvh;align-items:center;justify-content:center;background:var(--bg)}
.app{width:100%;max-width:480px;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);position:relative}
@media(min-width:640px){
  .app{height:90vh;max-height:800px;border-radius:16px;border:1px solid var(--border);box-shadow:0 24px 64px rgba(0,0,0,.5)}
}

/* HEADER */
.hdr{padding:env(safe-area-inset-top,16px) 20px 16px;flex-shrink:0}
.hdr-greeting{font-size:13px;color:var(--t3);font-weight:500;margin-bottom:2px}
.hdr-name{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:14px}
.hdr-progress{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.hdr-lv{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-dim);padding:3px 8px;border-radius:6px;white-space:nowrap}
.hdr-bar{flex:1;height:4px;background:var(--s2);border-radius:2px;overflow:hidden}
.hdr-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.hdr-xp{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.hdr-stats{display:flex;gap:8px}
.hdr-stat{flex:1;text-align:center;padding:8px 4px;background:var(--s1);border-radius:var(--r);border:1px solid var(--border)}
.hdr-stat-val{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.hdr-stat-lbl{font-size:9px;color:var(--t3);margin-top:2px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}

/* TABS */
.tabs{display:flex;padding:0 16px;gap:4px;flex-shrink:0}
.tab{flex:1;padding:10px 4px;color:var(--t3);font-size:11px;font-weight:600;text-align:center;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.3px}
.tab.on{color:var(--t1);border-bottom-color:var(--accent)}

/* CONTENT */
.cnt{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px 100px;-webkit-overflow-scrolling:touch}
.label{font-size:10px;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;margin-bottom:10px;font-weight:600}

/* DAILY TASKS */
.task-done-banner{text-align:center;padding:10px;background:var(--accent-dim);border:1px solid var(--accent-dim);border-radius:var(--r);font-size:12px;color:var(--accent);margin-bottom:10px;font-weight:600}
.task{display:flex;align-items:center;padding:12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;width:100%;text-align:left;transition:all .15s;gap:12px}
.task:active{transform:scale(.98)}
.task.ok{background:var(--accent-dark);border-color:var(--accent-dim)}
.task-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--s3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:11px;color:transparent}
.task.ok .task-box{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.task-text{flex:1;font-size:13px;color:var(--t2);font-weight:500}
.task.ok .task-text{color:var(--t3);text-decoration:line-through}
.task-pts{font-size:10px;color:var(--t4);font-family:'JetBrains Mono',monospace;font-weight:600}
.task.ok .task-pts{color:var(--accent);opacity:.5}

/* WORKOUT */
.w-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.w-day{padding:10px 6px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);color:var(--t3);font-size:10px;font-weight:600;text-align:center;transition:all .15s}
.w-day.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dark)}
.w-saved{text-align:center;padding:8px;background:var(--accent-dark);border:1px solid var(--accent-dim);border-radius:var(--r);font-size:11px;color:var(--accent);margin-bottom:10px;font-weight:500}
.ex-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:6px}
.ex-name{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:2px}
.ex-prev{font-size:10px;color:var(--purple);margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.set-n{font-size:10px;color:var(--t4);width:30px;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.set-in{width:58px;padding:7px 6px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--t1);font-size:13px;font-family:'JetBrains Mono',monospace;text-align:center;transition:all .2s}
.set-x{color:var(--t4);font-size:10px}
.set-btns{display:flex;gap:6px;margin-top:6px}
.set-btn{padding:4px 10px;border:1px solid var(--border)!important;border-radius:6px;color:var(--t3);font-size:9px;font-weight:600;transition:all .15s}
.set-btn:hover{border-color:var(--accent)!important;color:var(--accent)}
.set-btn.rm:hover{border-color:var(--red)!important;color:var(--red)}
.save-btn{width:100%;padding:14px;background:var(--accent);border-radius:var(--r);color:var(--bg);font-size:13px;font-weight:700;letter-spacing:.5px;margin-top:12px;transition:all .15s}
.save-btn:active{transform:scale(.97);opacity:.9}

/* TIMER */
.tmr{margin-bottom:16px}
.tmr-presets{display:flex;gap:6px;margin-bottom:8px}
.tmr-p{flex:1;padding:8px;background:var(--s1);border:1px solid var(--border)!important;border-radius:8px;color:var(--t3);font-size:10px;font-weight:600;text-align:center;transition:all .15s}
.tmr-p.on{border-color:var(--blue)!important;color:var(--blue);background:var(--blue-dim)}
.tmr-face{text-align:center;padding:20px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;transition:all .3s}
.tmr-face.go{border-color:var(--blue);box-shadow:0 0 20px var(--blue-dim)}
.tmr-face.end{border-color:var(--accent);box-shadow:0 0 20px var(--accent-dim)}
.tmr-num{font-size:40px;font-weight:800;color:var(--blue);letter-spacing:1px;font-family:'JetBrains Mono',monospace}
.tmr-face.end .tmr-num{color:var(--accent)}
.tmr-sub{font-size:10px;color:var(--t3);margin-top:4px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.tmr-btns{display:flex;gap:6px}
.tmr-go{flex:1;padding:10px;background:var(--blue);border-radius:8px;color:var(--bg);font-size:11px;font-weight:700;letter-spacing:.5px;transition:all .15s}
.tmr-go:disabled{opacity:.4}
.tmr-rst{flex:1;padding:10px;background:var(--s1);border:1px solid var(--border)!important;border-radius:8px;color:var(--t3);font-size:11px;font-weight:600}

/* STATS */
.inp-row{display:flex;gap:6px;margin-bottom:8px}
.txt-in{flex:1;padding:10px 12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);color:var(--t1);font-size:14px;font-family:'JetBrains Mono',monospace;transition:all .2s}
.sm-save{padding:10px 16px;background:var(--accent);border-radius:var(--r);color:var(--bg);font-size:11px;font-weight:700;transition:all .15s}
.today-v{font-size:11px;color:var(--t2);padding:4px 0;font-family:'JetBrains Mono',monospace}
.chart{background:var(--s1);border-radius:var(--r);padding:12px 8px 6px;margin-top:8px;border:1px solid var(--border);overflow-x:auto}
.chart svg{display:block}

/* BADGES */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:16px}
.badge{padding:12px 6px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);text-align:center;opacity:.25;transition:all .2s}
.badge.got{opacity:1;border-color:var(--gold-dim);background:linear-gradient(180deg,var(--s1),#18170f)}
.badge-ico{font-size:20px;margin-bottom:4px;filter:grayscale(1)}
.badge.got .badge-ico{filter:none}
.badge-nm{font-size:8px;font-weight:700;color:var(--t2);letter-spacing:.3px;text-transform:uppercase}
.badge.got .badge-nm{color:var(--gold)}
.badge-dsc{font-size:8px;color:var(--t4);margin-top:1px}

/* LOG */
.log{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:6px}
.log-dt{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.log-wk{font-size:10px;color:var(--t3);margin-bottom:2px;font-weight:600}
.log-ex{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border);font-size:10px}
.log-en{color:var(--t2)}
.log-es{color:var(--t3);font-family:'JetBrains Mono',monospace;font-size:9px}
.log-dots{display:flex;gap:6px;margin-top:4px}
.log-dot{width:8px;height:8px;border-radius:50%;background:var(--s3)}
.log-dot.on{background:var(--accent)}
.empty{text-align:center;padding:32px 20px;color:var(--t4);font-size:12px}

.data-row{display:flex;gap:6px;margin-top:20px}
.data-btn{flex:1;padding:12px;border:1px solid var(--border)!important;border-radius:var(--r);color:var(--t3);font-size:10px;text-align:center;font-weight:600;transition:all .15s}
.data-btn:hover{border-color:var(--accent)!important;color:var(--accent)}
.rst-btn{width:100%;padding:12px;border:1px solid #2a1520!important;border-radius:var(--r);color:var(--red);font-size:10px;margin-top:8px;font-weight:600;transition:all .15s}
.rst-btn:hover{background:#2a152010}

/* OVERLAYS */
.lvl-up{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lvl-card{text-align:center;padding:40px 48px;background:var(--s1);border:1px solid var(--accent);border-radius:16px;box-shadow:0 0 40px var(--accent-dim);animation:pop .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.lvl-t{font-size:12px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;font-weight:700}
.lvl-n{font-size:48px;font-weight:800;color:var(--t1);margin:8px 0;font-family:'JetBrains Mono',monospace}
.lvl-r{font-size:11px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}

.ach-pop{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--gold-dim);padding:12px 20px;border-radius:12px;z-index:100;animation:slideD .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;gap:10px}
@keyframes slideD{from{opacity:0;transform:translateX(-50%) translateY(-16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ach-pop-ico{font-size:24px}
.ach-pop-t{font-size:9px;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.ach-pop-n{font-size:12px;color:var(--t1);font-weight:600}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border);padding:8px 18px;border-radius:8px;font-size:12px;color:var(--accent);z-index:100;animation:toastIn .2s ease;pointer-events:none;white-space:nowrap;font-weight:600}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.ld{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.spinner{width:24px;height:24px;border:2px solid var(--s3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="ld" id="loading"><div class="spinner"></div></div>
<div class="shell"><div class="app" id="app"></div></div>
<input type="file" id="import-file" accept=".json" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/auth.js"></script>
<script>
const STORAGE_KEY='glowup-rpg-data';
const LEVEL_XP=[0,100,250,450,700,1000,1400,1900,2500,3200,4000,5000,6200,7600,9200,11000,13000,15500,18500,22000,26000,30500,35500,41000,47000,54000,62000,71000,81000,92000,104000,117000,131000,146000,162000,180000,200000,222000,246000,272000,300000,332000,368000,408000,452000,500000,555000,618000,690000,999999];
const TITLES=['Beginner','Novice','Apprentice','Trainee','Warrior','Fighter','Gladiator','Champion','Elite','Legendary','Mythic','Transcendent','Immortal','Ascended','God-Tier'];

const TASKS=[
  {id:'workout',label:'Workout',xp:50},
  {id:'calories',label:'Hit calorie target',xp:25},
  {id:'protein',label:'Hit protein target',xp:25},
  {id:'water',label:'2.5L+ water',xp:15},
  {id:'skincare_am',label:'AM skincare',xp:15},
  {id:'skincare_pm',label:'PM skincare',xp:15},
  {id:'sleep',label:'7+ hours sleep',xp:20},
  {id:'posture',label:'Posture work',xp:10},
];

const EXERCISES={
  'Upper Strength (Mon)':['Barbell Bench Press','Barbell Bent-Over Row','Standing OHP','Weighted Pull-Ups','Incline DB Press','Cable Face Pulls','Barbell Curl'],
  'Lower Strength (Wed)':['Barbell Back Squat','Romanian Deadlift','Leg Press','Walking Lunges','Lying Leg Curl','Standing Calf Raise','Hanging Leg Raise'],
  'Upper Hypertrophy (Fri)':['DB Bench Press','Seated Cable Row','Lateral Raise','Lat Pulldown','Cable Fly','Overhead Tricep Ext','Incline DB Curl'],
  'Lower Hypertrophy (Sat)':['Leg Press','Barbell Hip Thrust','Bulgarian Split Squat','Leg Extension','Lying Leg Curl','Seated Calf Raise','Ab Wheel Rollout'],
};

const BADGES=[
  {id:'first_workout',name:'First Session',desc:'Log a workout',ico:'\u{1F3CB}',check:d=>Object.keys(d.workouts).length>=1},
  {id:'streak_7',name:'One Week',desc:'7-day streak',ico:'\u{26A1}',check:d=>d.longestStreak>=7},
  {id:'streak_30',name:'Iron Will',desc:'30-day streak',ico:'\u{1F9E0}',check:d=>d.longestStreak>=30},
  {id:'level_5',name:'Level 5',desc:'Reach Lv.5',ico:'\u{2B50}',check:d=>getLevel(d.xp)>=5},
  {id:'level_10',name:'Level 10',desc:'Reach Lv.10',ico:'\u{1F451}',check:d=>getLevel(d.xp)>=10},
  {id:'level_25',name:'Level 25',desc:'Reach Lv.25',ico:'\u{1F3C6}',check:d=>getLevel(d.xp)>=25},
  {id:'workouts_10',name:'10 Sessions',desc:'Log 10 workouts',ico:'\u{1F4AA}',check:d=>Object.keys(d.workouts).length>=10},
  {id:'workouts_50',name:'50 Sessions',desc:'Log 50 workouts',ico:'\u{1F525}',check:d=>Object.keys(d.workouts).length>=50},
  {id:'weight_track',name:'Consistent',desc:'Track weight 7 days',ico:'\u{2696}',check:d=>Object.keys(d.weights).length>=7},
  {id:'all_tasks_5',name:'Perfect Day x5',desc:'All tasks done 5 times',ico:'\u{1F48E}',check:d=>{let c=0;for(const dt in d.logs){if(TASKS.every(q=>d.logs[dt][q.id]))c++}return c>=5}},
  {id:'xp_1000',name:'1K XP',desc:'Earn 1,000 XP',ico:'\u{1F3AF}',check:d=>d.xp>=1000},
  {id:'xp_10000',name:'10K XP',desc:'Earn 10,000 XP',ico:'\u{1F30B}',check:d=>d.xp>=10000},
];

const QUOTES=[
  "Discipline is choosing between what you want now and what you want most.",
  "The only bad workout is the one that didn't happen.",
  "You don't have to be extreme, just consistent.",
  "Small daily improvements lead to staggering long-term results.",
  "Your body keeps an accurate journal regardless of what you write down.",
  "The pain you feel today will be the strength you feel tomorrow.",
  "Motivation gets you started. Habit keeps you going.",
  "Be stronger than your excuses.",
];

const DEFAULT={xp:0,logs:{},workouts:{},weights:{},calories:{},protein:{},streak:0,longestStreak:0,lastLogDate:null,achievements:[]};

let data={...DEFAULT};
let playerName='Player';
let tab='today';
let selectedWorkout=Object.keys(EXERCISES)[0];
let workoutSets={};
let levelUpInfo=null;
let toastMsg=null;
let toastTimer=null;
let achUnlock=null;
let achTimer=null;
let currentUserId=null;
let saveTimeout=null;

let restSec=90,restRem=0,restInt=null,restOn=false,restEnd=false;

function loadLocal(){try{const s=localStorage.getItem(STORAGE_KEY);if(s){data={...DEFAULT,...JSON.parse(s)};if(!data.protein)data.protein={};if(!data.achievements)data.achievements=[]}}catch(e){}}

async function loadCloud(){try{const sb=initSupabase();const{data:row}=await sb.from('user_data').select('data').eq('user_id',currentUserId).single();if(row&&row.data){data={...DEFAULT,...row.data};if(!data.protein)data.protein={};if(!data.achievements)data.achievements=[];localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}}catch(e){loadLocal()}}

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}catch(e){}clearTimeout(saveTimeout);saveTimeout=setTimeout(()=>saveCloud(),300)}

async function saveCloud(){if(!currentUserId)return;try{const sb=initSupabase();await sb.from('user_data').upsert({user_id:currentUserId,data:data,updated_at:new Date().toISOString()},{onConflict:'user_id'})}catch(e){}}

function subscribeRealtime(){const sb=initSupabase();sb.channel('sync').on('postgres_changes',{event:'UPDATE',schema:'public',table:'user_data',filter:`user_id=eq.${currentUserId}`},(p)=>{if(p.new&&p.new.data){data={...DEFAULT,...p.new.data};if(!data.protein)data.protein={};if(!data.achievements)data.achievements=[];localStorage.setItem(STORAGE_KEY,JSON.stringify(data));render()}}).subscribe()}

function today(){return new Date().toISOString().split('T')[0]}
function fmtDate(s){const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}
function getLevel(xp){for(let i=LEVEL_XP.length-1;i>=0;i--)if(xp>=LEVEL_XP[i])return i+1;return 1}
function getTitle(lv){return TITLES[Math.min(Math.floor((lv-1)/3),TITLES.length-1)]}
function getXpNext(lv){return lv>=LEVEL_XP.length?LEVEL_XP[LEVEL_XP.length-1]:LEVEL_XP[lv]}
function getXpCur(lv){return lv<=1?0:LEVEL_XP[lv-1]}
function vibrate(ms){try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}}

function getGreeting(){const h=new Date().getHours();if(h<6)return'Late night';if(h<12)return'Good morning';if(h<17)return'Good afternoon';if(h<21)return'Good evening';return'Late night'}

function getDailyQuote(){const idx=Math.floor(new Date().getTime()/(1000*60*60*24))%QUOTES.length;return QUOTES[idx]}

function toast(msg){toastMsg=msg;render();clearTimeout(toastTimer);toastTimer=setTimeout(()=>{toastMsg=null;render()},1800)}
function showAch(a){achUnlock=a;render();clearTimeout(achTimer);achTimer=setTimeout(()=>{achUnlock=null;render()},2500)}
function checkAch(){BADGES.forEach(a=>{if(!data.achievements.includes(a.id)&&a.check(data)){data.achievements.push(a.id);save();setTimeout(()=>showAch(a),400)}})}

function toggleTask(id){
  const t=today(),log=data.logs[t]||{},was=log[id],q=TASKS.find(x=>x.id===id);
  log[id]=!was;
  const allBefore=TASKS.every(x=>(data.logs[t]||{})[x.id]);
  const allAfter=TASKS.every(x=>log[x.id]);
  let xp=was?-q.xp:q.xp;
  if(allAfter&&!allBefore)xp+=50;
  if(!allAfter&&allBefore)xp-=50;
  const oldLv=getLevel(data.xp);
  data.xp=Math.max(0,data.xp+xp);
  const newLv=getLevel(data.xp);
  data.logs[t]=log;
  if(!was){const y=new Date();y.setDate(y.getDate()-1);const ys=y.toISOString().split('T')[0];if(data.lastLogDate===ys||data.lastLogDate===t)data.streak=data.lastLogDate===t?data.streak:data.streak+1;else data.streak=1;data.longestStreak=Math.max(data.longestStreak,data.streak);data.lastLogDate=t}
  if(newLv>oldLv){levelUpInfo={to:newLv};vibrate([80,40,80]);setTimeout(()=>{levelUpInfo=null;render()},2500)}
  if(!was){toast(`+${q.xp}${allAfter&&!allBefore?' +50 bonus':''}`);vibrate(20)}
  save();checkAch();render();
}

function getLastSets(wk,ex){const e=Object.entries(data.workouts).sort((a,b)=>b[0].localeCompare(a[0]));for(const[d,s]of e){if(d===today())continue;if(s[wk]&&s[wk][ex])return s[wk][ex]}return null}
function fmtLast(sets){if(!sets||!Array.isArray(sets))return null;const v=sets.filter(s=>s.weight||s.reps);if(!v.length)return null;return v.map(s=>`${s.weight||'?'} x ${s.reps||'?'}`).join(' / ')}

function saveWorkout(){const t=today();if(!data.workouts[t])data.workouts[t]={};data.workouts[t][selectedWorkout]={...workoutSets};workoutSets={};save();vibrate(40);toast('Saved');checkAch();render()}
function saveWeight(){const v=document.getElementById('w-in');if(!v||!v.value)return;data.weights[today()]=parseFloat(v.value);save();vibrate(20);toast(v.value+' kg');v.value='';checkAch();render()}
function saveCal(){const v=document.getElementById('c-in');if(!v||!v.value)return;data.calories[today()]=parseInt(v.value);save();vibrate(20);toast(v.value+' kcal');v.value='';render()}
function saveProt(){const v=document.getElementById('p-in');if(!v||!v.value)return;data.protein[today()]=parseInt(v.value);save();vibrate(20);toast(v.value+'g');v.value='';render()}

function exportData(){const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`backup-${today()}.json`;a.click();URL.revokeObjectURL(u);toast('Exported')}
function importData(){document.getElementById('import-file').click()}
function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const i=JSON.parse(ev.target.result);if(i.xp!==undefined){data={...DEFAULT,...i};if(!data.protein)data.protein={};if(!data.achievements)data.achievements=[];save();toast('Imported');render()}else toast('Invalid file')}catch(err){toast('Failed')}};r.readAsText(f);e.target.value=''}
function resetAll(){if(confirm('Reset everything? Can\'t undo.')){data={...DEFAULT};save();render()}}

function setTimer(s){restSec=s;if(!restOn){restRem=s;restEnd=false}render()}
function startTimer(){if(restOn)return;restRem=restSec;restOn=true;restEnd=false;vibrate(20);render();restInt=setInterval(()=>{restRem--;if(restRem<=0){clearInterval(restInt);restOn=false;restEnd=true;restRem=0;vibrate([150,80,150]);try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=800;o.type='sine';g.gain.value=0.12;o.start();setTimeout(()=>{o.stop();c.close()},250)}catch(e){}}render()},1000)}
function stopTimer(){clearInterval(restInt);restOn=false;restEnd=false;restRem=restSec;render()}
function fmtT(s){return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0')}

function render(){
  const t=today(),log=data.logs[t]||{};
  const lv=getLevel(data.xp),title=getTitle(lv);
  const xC=getXpCur(lv),xN=getXpNext(lv),xP=data.xp-xC,xD=xN-xC;
  const pct=Math.min((xP/xD)*100,100);
  const done=TASKS.filter(q=>log[q.id]).length;
  const allDone=done===TASKS.length;
  const nm=playerName.replace(/</g,'&lt;').replace(/>/g,'&gt;');

  let h='';

  if(levelUpInfo){h+=`<div class="lvl-up" onclick="this.remove()"><div class="lvl-card"><div class="lvl-t">Level Up</div><div class="lvl-n">${levelUpInfo.to}</div><div class="lvl-r">${getTitle(levelUpInfo.to)}</div></div></div>`}
  if(achUnlock){h+=`<div class="ach-pop"><div class="ach-pop-ico">${achUnlock.ico}</div><div><div class="ach-pop-t">Unlocked</div><div class="ach-pop-n">${achUnlock.name}</div></div></div>`}

  h+=`<div class="hdr">
    <div class="hdr-greeting">${getGreeting()}</div>
    <div class="hdr-name">${nm}</div>
    <div class="hdr-progress">
      <span class="hdr-lv">Lv. ${lv}</span>
      <div class="hdr-bar"><div class="hdr-fill" style="width:${pct}%"></div></div>
      <span class="hdr-xp">${xP.toLocaleString()} / ${xD.toLocaleString()}</span>
    </div>
    <div class="hdr-stats">
      <div class="hdr-stat"><div class="hdr-stat-val">${data.xp.toLocaleString()}</div><div class="hdr-stat-lbl">XP</div></div>
      <div class="hdr-stat"><div class="hdr-stat-val">${data.streak}</div><div class="hdr-stat-lbl">Streak</div></div>
      <div class="hdr-stat"><div class="hdr-stat-val">${data.longestStreak}</div><div class="hdr-stat-lbl">Best</div></div>
      <div class="hdr-stat"><div class="hdr-stat-val">${done}/${TASKS.length}</div><div class="hdr-stat-lbl">Today</div></div>
    </div>
  </div>`;

  const tabs=[{id:'today',l:'Today'},{id:'gym',l:'Gym'},{id:'track',l:'Track'},{id:'log',l:'Log'}];
  h+=`<div class="tabs">${tabs.map(tb=>`<button class="tab${tab===tb.id?' on':''}" onclick="tab='${tb.id}';render()">${tb.l}</button>`).join('')}</div>`;

  h+='<div class="cnt">';

  if(tab==='today'){
    h+=`<div class="label">${fmtDate(t)}</div>`;
    if(allDone)h+=`<div class="task-done-banner">All done today \u2014 +50 bonus XP</div>`;
    TASKS.forEach(q=>{
      const d=log[q.id];
      h+=`<button class="task${d?' ok':''}" onclick="toggleTask('${q.id}')">
        <div class="task-box">${d?'\u2713':''}</div>
        <div class="task-text">${q.label}</div>
        <div class="task-pts">+${q.xp}</div></button>`;
    });
    h+=`<div style="margin-top:16px;padding:12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--t3);font-style:italic;line-height:1.5">${getDailyQuote()}</div>`;
  }

  if(tab==='gym'){
    h+=`<div class="label">Rest Timer</div><div class="tmr">
      <div class="tmr-presets">
        <button class="tmr-p${restSec===60?' on':''}" onclick="setTimer(60)">60s</button>
        <button class="tmr-p${restSec===90?' on':''}" onclick="setTimer(90)">90s</button>
        <button class="tmr-p${restSec===120?' on':''}" onclick="setTimer(120)">2m</button>
        <button class="tmr-p${restSec===180?' on':''}" onclick="setTimer(180)">3m</button>
      </div>
      <div class="tmr-face${restOn?' go':''}${restEnd?' end':''}">
        <div class="tmr-num">${fmtT(restOn||restEnd?restRem:restSec)}</div>
        <div class="tmr-sub">${restEnd?'Done \u2014 go':restOn?'Resting':'Ready'}</div>
      </div>
      <div class="tmr-btns">
        <button class="tmr-go" onclick="${restOn?'':'startTimer()'}" ${restOn?'disabled':''}>${restOn?'Running':'Start'}</button>
        <button class="tmr-rst" onclick="stopTimer()">Reset</button>
      </div></div>`;

    h+=`<div class="label">Log Workout</div><div class="w-grid">`;
    Object.keys(EXERCISES).forEach(w=>{h+=`<button class="w-day${selectedWorkout===w?' on':''}" onclick="selectedWorkout='${w}';workoutSets={};render()">${w.split(' (')[0]}</button>`});
    h+='</div>';
    if(data.workouts[t]?.[selectedWorkout])h+='<div class="w-saved">Logged today</div>';

    EXERCISES[selectedWorkout].forEach(ex=>{
      const sets=workoutSets[ex]||[{weight:'',reps:''}];
      const last=fmtLast(getLastSets(selectedWorkout,ex));
      h+=`<div class="ex-card"><div class="ex-name">${ex}</div>`;
      if(last)h+=`<div class="ex-prev">prev: ${last}</div>`;
      sets.forEach((s,i)=>{h+=`<div class="set-row"><span class="set-n">${i+1}</span><input class="set-in" type="number" placeholder="kg" value="${s.weight}" onchange="updateSet('${ex}',${i},'weight',this.value)"><span class="set-x">\u00d7</span><input class="set-in" type="number" placeholder="reps" value="${s.reps}" onchange="updateSet('${ex}',${i},'reps',this.value)"></div>`});
      h+=`<div class="set-btns"><button class="set-btn" onclick="addSet('${ex}')">+ set</button><button class="set-btn rm" onclick="removeSet('${ex}')">\u2212 set</button></div></div>`;
    });
    h+='<button class="save-btn" onclick="saveWorkout()">Save Workout</button>';
  }

  if(tab==='track'){
    h+=`<div class="label">Weight</div>
      <div class="inp-row"><input class="txt-in" type="number" step="0.1" placeholder="kg" id="w-in" value="${data.weights[t]||''}"><button class="sm-save" onclick="saveWeight()">Save</button></div>`;
    if(data.weights[t])h+=`<div class="today-v">${data.weights[t]} kg today</div>`;
    const wh=Object.entries(data.weights).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);
    if(wh.length>1){const mx=Math.max(...wh.map(w=>w[1])),mn=Math.min(...wh.map(w=>w[1])),rg=Math.max(mx-mn,2),sw=Math.max(wh.length*48,200);h+='<div class="chart"><svg viewBox="0 0 '+sw+' 110" width="100%" height="110">';wh.forEach((w,i)=>{const x=i*(sw/wh.length)+24,y=95-((w[1]-mn)/rg)*70;if(i>0){const px=(i-1)*(sw/wh.length)+24,py=95-((wh[i-1][1]-mn)/rg)*70;h+=`<line x1="${px}" y1="${py}" x2="${x}" y2="${y}" stroke="#6ee7a0" stroke-width="1.5" opacity=".6"/>`}h+=`<circle cx="${x}" cy="${y}" r="3" fill="#6ee7a0"/><text x="${x}" y="${y-8}" fill="#a0a0b0" font-size="8" text-anchor="middle" font-family="monospace">${w[1]}</text><text x="${x}" y="108" fill="#505060" font-size="7" text-anchor="middle" font-family="monospace">${w[0].slice(5)}</text>`});h+='</svg></div>'}

    h+=`<div class="label" style="margin-top:20px">Calories</div>
      <div class="inp-row"><input class="txt-in" type="number" placeholder="kcal" id="c-in" value="${data.calories[t]||''}"><button class="sm-save" onclick="saveCal()">Save</button></div>`;
    if(data.calories[t]){const c=data.calories[t];const s=c>=2600&&c<=2900?' \u2014 on target':c<2600?' \u2014 under':' \u2014 over';h+=`<div class="today-v">${c} kcal${s}</div>`}
    const ch=Object.entries(data.calories).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);
    if(ch.length>1){const mx=Math.max(...ch.map(c=>c[1])),mn=Math.min(...ch.map(c=>c[1])),rg=Math.max(mx-mn,500),sw=Math.max(ch.length*48,200);h+='<div class="chart"><svg viewBox="0 0 '+sw+' 110" width="100%" height="110">';const ty=95-((2600-mn)/rg)*70;h+=`<line x1="0" y1="${ty}" x2="${sw}" y2="${ty}" stroke="#6ee7a030" stroke-width="1" stroke-dasharray="4"/>`;ch.forEach((c,i)=>{const x=i*(sw/ch.length)+24,y=95-((c[1]-mn)/rg)*70;if(i>0){const px=(i-1)*(sw/ch.length)+24,py=95-((ch[i-1][1]-mn)/rg)*70;h+=`<line x1="${px}" y1="${py}" x2="${x}" y2="${y}" stroke="#f0a060" stroke-width="1.5" opacity=".6"/>`}h+=`<circle cx="${x}" cy="${y}" r="3" fill="#f0a060"/><text x="${x}" y="${y-8}" fill="#a0a0b0" font-size="8" text-anchor="middle" font-family="monospace">${c[1]}</text><text x="${x}" y="108" fill="#505060" font-size="7" text-anchor="middle" font-family="monospace">${c[0].slice(5)}</text>`});h+='</svg></div>'}

    h+=`<div class="label" style="margin-top:20px">Protein</div>
      <div class="inp-row"><input class="txt-in" type="number" placeholder="grams" id="p-in" value="${data.protein[t]||''}"><button class="sm-save" onclick="saveProt()">Save</button></div>`;
    if(data.protein[t]){const p=data.protein[t];const s=p>=140&&p<=150?' \u2014 on target':p<140?' \u2014 under':' \u2014 over';h+=`<div class="today-v">${p}g${s}</div>`}
    const ph=Object.entries(data.protein).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);
    if(ph.length>1){const mx=Math.max(...ph.map(p=>p[1])),mn=Math.min(...ph.map(p=>p[1])),rg=Math.max(mx-mn,30),sw=Math.max(ph.length*48,200);h+='<div class="chart"><svg viewBox="0 0 '+sw+' 110" width="100%" height="110">';const ty=95-((140-mn)/rg)*70;h+=`<line x1="0" y1="${ty}" x2="${sw}" y2="${ty}" stroke="#b48efa30" stroke-width="1" stroke-dasharray="4"/>`;ph.forEach((p,i)=>{const x=i*(sw/ph.length)+24,y=95-((p[1]-mn)/rg)*70;if(i>0){const px=(i-1)*(sw/ph.length)+24,py=95-((ph[i-1][1]-mn)/rg)*70;h+=`<line x1="${px}" y1="${py}" x2="${x}" y2="${y}" stroke="#b48efa" stroke-width="1.5" opacity=".6"/>`}h+=`<circle cx="${x}" cy="${y}" r="3" fill="#b48efa"/><text x="${x}" y="${y-8}" fill="#a0a0b0" font-size="8" text-anchor="middle" font-family="monospace">${p[1]}</text><text x="${x}" y="108" fill="#505060" font-size="7" text-anchor="middle" font-family="monospace">${p[0].slice(5)}</text>`});h+='</svg></div>'}
  }

  if(tab==='log'){
    h+=`<div class="label">Badges \u2014 ${data.achievements.length}/${BADGES.length}</div><div class="badge-grid">`;
    BADGES.forEach(a=>{const u=data.achievements.includes(a.id);h+=`<div class="badge${u?' got':''}"><div class="badge-ico">${a.ico}</div><div class="badge-nm">${a.name}</div><div class="badge-dsc">${a.desc}</div></div>`});
    h+='</div>';

    h+=`<div class="label">Workouts</div>`;
    const we=Object.entries(data.workouts).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,10);
    if(!we.length)h+='<div class="empty">Nothing yet</div>';
    we.forEach(([dt,sess])=>{h+=`<div class="log"><div class="log-dt">${fmtDate(dt)}</div>`;Object.entries(sess).forEach(([wk,exs])=>{h+=`<div class="log-wk">${wk}</div>`;Object.entries(exs).forEach(([ex,sets])=>{const s=Array.isArray(sets)?sets.filter(s=>s.weight||s.reps).map(s=>`${s.weight}x${s.reps}`).join(', '):'\u2014';h+=`<div class="log-ex"><span class="log-en">${ex}</span><span class="log-es">${s}</span></div>`})});h+='</div>'});

    h+=`<div class="label" style="margin-top:16px">History</div>`;
    const le=Object.entries(data.logs).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7);
    le.forEach(([dt,lg])=>{const cnt=TASKS.filter(q=>lg[q.id]).length;h+=`<div class="log"><div class="log-dt">${fmtDate(dt)} \u2014 ${cnt}/${TASKS.length}</div><div class="log-dots">${TASKS.map(q=>`<div class="log-dot${lg[q.id]?' on':''}"></div>`).join('')}</div></div>`});

    h+=`<div class="data-row"><button class="data-btn" onclick="exportData()">Export</button><button class="data-btn" onclick="importData()">Import</button></div>
      <button class="rst-btn" onclick="resetAll()">Reset All Data</button>
      <button class="rst-btn" style="border-color:var(--border)!important;color:var(--t3);margin-top:6px" onclick="signOut()">Sign Out</button>`;
  }

  h+='</div>';
  if(toastMsg)h+=`<div class="toast">${toastMsg}</div>`;
  document.getElementById('app').innerHTML=h;
}

window.updateSet=function(ex,i,f,v){if(!workoutSets[ex])workoutSets[ex]=[{weight:'',reps:''}];while(workoutSets[ex].length<=i)workoutSets[ex].push({weight:'',reps:''});workoutSets[ex][i][f]=v};
window.addSet=function(ex){if(!workoutSets[ex])workoutSets[ex]=[{weight:'',reps:''}];workoutSets[ex].push({weight:'',reps:''});render()};
window.removeSet=function(ex){if(workoutSets[ex]&&workoutSets[ex].length>1){workoutSets[ex].pop();render()}};
window.toggleTask=toggleTask;window.saveWorkout=saveWorkout;window.saveWeight=saveWeight;window.saveCal=saveCal;window.saveProt=saveProt;
window.resetAll=resetAll;window.exportData=exportData;window.importData=importData;
window.setTimer=setTimer;window.startTimer=startTimer;window.stopTimer=stopTimer;window.signOut=signOut;

document.getElementById('import-file').addEventListener('change',handleImport);

(async()=>{
  initSupabase();
  const user=await requireAuth();
  if(!user)return;
  currentUserId=user.id;
  playerName=await getDisplayName()||'Player';
  loadLocal();
  await loadCloud();
  subscribeRealtime();
  document.getElementById('loading').style.display='none';
  checkAch();
  render();
})();

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
